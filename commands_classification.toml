# WinuxCmd Command Classification Configuration
# Based on actual 137 WinuxCmd commands from source files

[simple_commands]
# Simple DLL commands - non-interactive, output-only (131 commands)
simple = [
    # File operations
    "ls", "cat", "cp", "mv", "rm", "touch", "mkdir", "rmdir", "ln", "link", "unlink",
    "chmod", "stat", "file", "find", "du", "df",
    
    # Text processing
    "grep", "head", "tail", "sort", "uniq", "cut", "paste", "join", "comm", "cmp",
    "diff", "diff3", "sdiff", "tr", "rev", "tac", "nl", "pr", "fold", "fmt", "column",
    "expand", "unexpand", "split", "csplit", "tee", "od", "xxd", "shuf", "jq", "wc",
    
    # Hash/checksum
    "md5sum", "sha1sum", "sha224sum", "sha256sum", "sha384sum", "sha512sum", "b2sum",
    "cksum", "sum", "hmac256", "base64", "base32", "basenc",
    
    # System info
    "arch", "uname", "hostname", "hostid", "who", "whoami", "users", "id", "groups",
    "uptime", "free", "ps", "tty", "locale", "logname", "ptx", "lsof",
    
    # Process management
    "kill", "nice", "nohup", "watch", "timeout", "sleep", "sync",
    
    # Path operations
    "pwd", "realpath", "readlink", "dirname", "basename", "pathchk", "which",
    "cygpath", "d2u", "u2d", "unix2dos", "dos2unix",
    
    # File content
    "echo", "printf", "printenv", "env", "test", "test_bracket", "expr",
    
    # System utilities
    "date", "cal", "true", "false", "yes", "seq", "factor", "numfmt",
    "nproc", "infocmp", "getconf", "stdbuf", "tput", "tic", "toe", "tzset",
    "reset", "clear", "shred", "truncate", "tsort", "mktemp",
    
    # Archive and conversion
    "cpio", "patch", "dd", "install",
    
    # Misc
    "pinky", "mpicalc",
]

[interactive_commands]
# Interactive commands requiring TTY handling (2 commands)
interactive = [
    "less", "top",
]

[complex_commands]
# Commands with complex parsing or special behavior (2 commands)
complex = [
    "sed", "xargs",
]

[builtin_commands]
# Native WinSH implemented commands (not WinuxCmd commands)
builtin = [
    "cd", "pwd", "echo", "exit", "clear", "cls", "env", "set", "unset", "export",
    "jobs", "bg", "fg", "kill", "history", "alias", "unalias", "help", "which",
]

[command_priority]
# Execution priority (1=highest)
builtin = 1      # Native WinSH commands
simple = 2       # Simple DLL commands (most common)
complex = 3      # Complex DLL commands  
interactive = 4  # Interactive commands (TTY handling)

# Special handling properties for commands
# These are properties, not additional command lists
command_properties = [
    { name = "less",    tty_restore = true,  interactive = true },
    { name = "top",     tty_restore = true,  interactive = true },
    { name = "grep",    pipe_friendly = true, stream_output = true, text_processing = true },
    { name = "sed",     pipe_friendly = true, stream_output = true, text_processing = true },
    { name = "xargs",   pipe_friendly = true, batch_mode = true },
    { name = "cut",     pipe_friendly = true, text_processing = true },
    { name = "sort",    pipe_friendly = true, batch_mode = true, text_processing = true },
    { name = "uniq",    pipe_friendly = true, batch_mode = true, text_processing = true },
    { name = "head",    pipe_friendly = true, stream_output = true },
    { name = "tail",    pipe_friendly = true, stream_output = true },
    { name = "find",    batch_mode = true, path_based = true },
    { name = "ls",      path_based = true },
    { name = "cd",      path_based = true },
    { name = "pwd",     path_based = true },
    { name = "stat",    path_based = true },
    { name = "file",    path_based = true },
    { name = "which",   path_based = true },
    { name = "readlink", path_based = true },
    { name = "realpath", path_based = true },
    { name = "tr",      text_processing = true },
    { name = "rev",     text_processing = true },
    { name = "tac",     text_processing = true },
    { name = "comm",    text_processing = true },
    { name = "join",    text_processing = true },
    { name = "paste",   text_processing = true },
    { name = "diff",    text_processing = true },
    { name = "cmp",     text_processing = true },
    { name = "jq",      text_processing = true },
    { name = "base64",  encoding = true },
    { name = "base32",  encoding = true },
    { name = "basenc",  encoding = true },
    { name = "d2u",     encoding = true },
    { name = "u2d",     encoding = true },
    { name = "unix2dos", encoding = true },
    { name = "dos2unix", encoding = true },
]